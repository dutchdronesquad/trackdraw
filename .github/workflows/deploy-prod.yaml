---
name: Deploy Production

# yamllint disable-line rule:truthy
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy to production (tag or commit SHA)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

env:
  DEFAULT_NODE: 24

jobs:
  migrate:
    name: Apply D1 Migrations
    runs-on: ubuntu-latest
    environment: cf-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}
          fetch-depth: 0
      - name: Setup Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply production D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run migrate:up:production
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: migrate
    environment: cf-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}
          fetch-depth: 0
      - name: Resolve checked out commit
        id: rev
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
      - name: Setup Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          NEXT_PUBLIC_APP_VERSION: "${{ github.event_name == 'release' && github.event.release.tag_name || format('sha-{0}', steps.rev.outputs.short_sha) }}"
          NEXT_PUBLIC_COMMIT_SHA: "${{ steps.rev.outputs.sha }}"
        run: npx opennextjs-cloudflare build
      - name: Check worker size
        run: |
          SIZE=$(wc -c < .open-next/server-functions/default/handler.mjs)
          LIMIT=$((9 * 1024 * 1024))
          echo "handler.mjs: $(( SIZE / 1024 / 1024 )).$((SIZE / 1024 % 1024 / 100)) MiB (limit 9 MiB)"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::error::Worker handler exceeds 9 MiB — bundle too large to deploy safely"
            exit 1
          fi
      - name: Deploy production build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_APP_VERSION: "${{ github.event_name == 'release' && github.event.release.tag_name || format('sha-{0}', steps.rev.outputs.short_sha) }}"
          NEXT_PUBLIC_COMMIT_SHA: "${{ steps.rev.outputs.sha }}"
        run: npx opennextjs-cloudflare deploy --tag "$NEXT_PUBLIC_APP_VERSION"
