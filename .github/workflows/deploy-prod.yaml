---
name: Deploy Production

# yamllint disable-line rule:truthy
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy to production (tag or commit SHA)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

env:
  DEFAULT_NODE: 24

jobs:
  deploy:
    name: Deploy to Cloudflare production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}
          fetch-depth: 0
      - name: Resolve checked out commit
        id: rev
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Setup Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Deploy production build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_APP_VERSION: "${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}"
          NEXT_PUBLIC_COMMIT_SHA: "${{ steps.rev.outputs.sha }}"
        run: npx opennextjs-cloudflare build && npx opennextjs-cloudflare deploy
