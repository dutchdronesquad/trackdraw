---
name: Deploy Development

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-dev
  cancel-in-progress: true

env:
  DEFAULT_NODE: 24

jobs:
  migrate:
    name: Apply D1 Migrations
    runs-on: ubuntu-latest
    environment: cf-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply development D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run migrate:up:dev

  deploy:
    name: Deploy Development
    runs-on: ubuntu-latest
    needs: migrate
    environment: cf-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Resolve checked out commit
        id: rev
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
      - name: Setup Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          NEXT_PUBLIC_APP_VERSION: "dev-${{ steps.rev.outputs.short_sha }}"
          NEXT_PUBLIC_COMMIT_SHA: "${{ steps.rev.outputs.sha }}"
        run: npx opennextjs-cloudflare build
      - name: Check worker size
        run: |
          RAW_SIZE=$(wc -c < .open-next/server-functions/default/handler.mjs)
          GZIP_SIZE=$(gzip -c .open-next/server-functions/default/handler.mjs | wc -c)
          RAW_HARD_LIMIT=$((9 * 1024 * 1024))
          GZIP_RISK_LIMIT=$((2200 * 1024))
          echo "handler.mjs raw: $RAW_SIZE bytes"
          echo "handler.mjs gzip: $GZIP_SIZE bytes"
          echo "Worker raw hard limit: $RAW_HARD_LIMIT bytes (9 MiB)"
          echo "Worker gzip risk threshold: $GZIP_RISK_LIMIT bytes (~2.15 MiB)"
          if [ "$RAW_SIZE" -gt "$RAW_HARD_LIMIT" ]; then
            echo "::error::Worker handler raw size exceeds the 9 MiB guardrail"
            exit 1
          fi
          if [ "$GZIP_SIZE" -gt "$GZIP_RISK_LIMIT" ]; then
            echo "::warning::Worker handler gzip size is in the recent high-risk range for Cloudflare deploys"
          fi
      - name: Deploy development build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_APP_VERSION: "dev-${{ steps.rev.outputs.short_sha }}"
          NEXT_PUBLIC_COMMIT_SHA: "${{ steps.rev.outputs.sha }}"
        run: npx opennextjs-cloudflare deploy --env dev --tag "$NEXT_PUBLIC_APP_VERSION"
