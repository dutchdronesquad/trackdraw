---
name: Deploy Development

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
      - klaas-2026-061
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-dev
  cancel-in-progress: true

env:
  DEFAULT_NODE: 24

jobs:
  migrate:
    name: Run development migrations
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run development migrations
        env:
          DATABASE_URL_DEVELOPMENT: ${{ secrets.DATABASE_URL_DEVELOPMENT }}
        run: npm run migrate:up:dev

  deploy:
    name: Deploy to Cloudflare dev
    runs-on: ubuntu-latest
    needs: migrate
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Resolve checked out commit
        id: rev
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Setup Node.js ${{ env.DEFAULT_NODE }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.DEFAULT_NODE }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Deploy development build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_APP_VERSION: "dev-${{ steps.rev.outputs.sha }}"
          NEXT_PUBLIC_COMMIT_SHA: "${{ steps.rev.outputs.sha }}"
        run: npx opennextjs-cloudflare build && npx opennextjs-cloudflare deploy --env dev
